name: Terraform Deploy - DEV

on:
  push:
    branches:
      - main
    paths:
      - "aws/**"
  workflow_dispatch:

env:
  TF_WORKING_DIR: ./aws/env/dev
  TF_VAR_FILE: dev.tfvars

jobs:
  ###############################################################
  # JOB 1 — Terraform Plan (runs automatically on push)
  ###############################################################
  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    environment: dev

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="${{ env.TF_VAR_FILE }}" \
            -out=tfplan \
            -no-color 2>&1 | tee plan_output.txt

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/plan_output.txt
          retention-days: 5

      - name: Post Plan Summary
        run: |
          echo "## 📋 Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat plan_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  ###############################################################
  # JOB 2 — Manual Approval Gate
  ###############################################################
  approval:
    name: "Waiting for Approval"
    runs-on: ubuntu-latest
    needs: plan
    environment: dev-approval        # ← GitHub Environment with required reviewers

    steps:
      - name: Approval Gate
        run: echo "✅ Approved! Proceeding to Terraform Apply..."

  ###############################################################
  # JOB 3 — Terraform Apply (runs only after approval)
  ###############################################################
  apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: approval
    environment: dev

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Post Apply Summary
        run: |
          echo "## 🚀 Terraform Apply Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** DEV" >> $GITHUB_STEP_SUMMARY
          echo "- **Bucket:** vasanth-backend-bucket-s3" >> $GITHUB_STEP_SUMMARY
          echo "- **State Lock Table:** terraform-state-lock" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY